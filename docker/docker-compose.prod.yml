version: "3.8"

services:
  # PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: gusto-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gusto}
      POSTGRES_USER: ${POSTGRES_USER:-gusto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gusto} -d ${POSTGRES_DB:-gusto}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gusto-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: gusto-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gusto-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gusto-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-gusto}:${POSTGRES_PASSWORD:-changeme}@db/${POSTGRES_DB:-gusto}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - BOT_TOKEN=${BOT_TOKEN}
      - CRYPTOBOT_TOKEN=${CRYPTOBOT_TOKEN}
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID}
      - YOOKASSA_SECRET_KEY=${YOOKASSA_SECRET_KEY}
      - FREEKASSA_ID=${FREEKASSA_ID}
      - FREEKASSA_SECRET=${FREEKASSA_SECRET}
      - FREEKASSA_API_KEY=${FREEKASSA_API_KEY}
      - ADMIN_IDS=${ADMIN_IDS}
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - gusto-network

  # Telegram Bot
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: gusto-bot
    restart: always
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - BACKEND_URL=http://backend:8000
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/1
      - ENVIRONMENT=production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - gusto-network

  # Admin Panel
  admin:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    container_name: gusto-admin
    restart: always
    depends_on:
      - backend
    networks:
      - gusto-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: gusto-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/www:/var/www/html:ro
    depends_on:
      - backend
      - admin
    networks:
      - gusto-network

  # Backup service
  backup:
    image: postgres:15-alpine
    container_name: gusto-backup
    restart: "no"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-gusto}
      - POSTGRES_USER=${POSTGRES_USER:-gusto}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - BACKUP_RETENTION_DAYS=30
    volumes:
      - postgres_data:/var/lib/postgresql/data:ro
      - ./backups:/backups
    command: >
      sh -c "
        while true; do
          sleep 86400;
          pg_dump -h db -U $POSTGRES_USER -d $POSTGRES_DB -f /backups/gusto_$(date +%Y%m%d_%H%M%S).sql;
          find /backups -name 'gusto_*.sql' -mtime +$BACKUP_RETENTION_DAYS -delete;
        done
      "
    networks:
      - gusto-network

volumes:
  postgres_data:
  redis_data:

networks:
  gusto-network:
    driver: bridge
