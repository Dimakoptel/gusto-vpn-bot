version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: gusto-postgres
    restart: always
    environment:
      POSTGRES_USER: gusto
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gusto_password}
      POSTGRES_DB: gusto
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gusto -d gusto"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gusto-network

  redis:
    image: redis:7-alpine
    container_name: gusto-redis
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gusto-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gusto-backend
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://gusto:${DB_PASSWORD:-gusto_password}@postgres:5432/gusto
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /var/log/gusto:/var/log
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - gusto-network

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: gusto-bot
    restart: always
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      BACKEND_URL: http://gusto-backend:8000
      REDIS_URL: redis://redis:6379/1
    volumes:
      - ./bot:/app
      - /var/log/gusto:/var/log
    depends_on:
      - backend
      - redis
    networks:
      - gusto-network

  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    container_name: gusto-admin
    restart: always
    environment:
      REACT_APP_API_URL: http://gusto-backend:8000
    # Нет ports — доступ только через nginx
    depends_on:
      - backend
    networks:
      - gusto-network

  nginx:
    image: nginx:alpine
    container_name: gusto-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro  # SSL сертификаты
    depends_on:
      - backend
      - admin-panel
    networks:
      - gusto-network

  backup:
    image: postgres:15-alpine
    container_name: gusto-backup
    restart: "no"
    environment:
      PGPASSWORD: ${DB_PASSWORD:-gusto_password}
    volumes:
      - ./backups:/backups
    command: >
      sh -c "
        while true; do
          sleep 86400;
          pg_dump -h postgres -U gusto -d gusto | gzip > /backups/gusto_$(date +%Y%m%d_%H%M%S).sql.gz;
          find /backups -name '*.sql.gz' -mtime +30 -delete;
        done
      "
    depends_on:
      - postgres
    networks:
      - gusto-network

volumes:
  postgres_data:
  redis_data:

networks:
  gusto-network:
    driver: bridge
